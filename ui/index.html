<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disco Romana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0908;
    --panel: #14120f;
    --border: #2a2520;
    --text: #d4c5a9;
    --text-dim: #8a7e6a;
    --text-bright: #f0e6cc;
    --accent: #c9a84c;
    --accent-dim: #8a7030;
    --red: #a84032;
    --green: #4a7a3a;
    --blue: #3a5a8a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 18px;
    line-height: 1.6;
    height: 100vh;
    overflow: hidden;
  }

  /* Layout */
  #app {
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    grid-template-rows: auto 1fr;
    height: 100vh;
    gap: 0;
  }

  /* Header */
  #header {
    grid-column: 1 / -1;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #header h1 {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  #phase-info {
    font-size: 14px;
    color: var(--text-dim);
  }

  #turn-counter {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--accent);
  }

  /* Left sidebar - status */
  #sidebar-left {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 20px;
  }

  .sidebar-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 14px;
  }

  .stat-label { color: var(--text-dim); }
  .stat-value { color: var(--text-bright); font-weight: 600; }
  .stat-positive { color: var(--green); }
  .stat-negative { color: var(--red); }

  .stat-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 2px;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Main conversation area */
  #main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #conversation-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 24px 48px;
    scroll-behavior: smooth;
  }

  #conversation-scroll::-webkit-scrollbar { width: 6px; }
  #conversation-scroll::-webkit-scrollbar-track { background: transparent; }
  #conversation-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    max-width: 640px;
    margin: 0 auto 16px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-npc {
    padding: 16px 20px;
    background: rgba(201, 168, 76, 0.05);
    border-left: 3px solid var(--accent-dim);
    border-radius: 0 4px 4px 0;
  }

  .msg-npc .speaker {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .msg-player {
    padding: 16px 20px;
    background: rgba(58, 90, 138, 0.1);
    border-left: 3px solid var(--blue);
    border-radius: 0 4px 4px 0;
    color: var(--text-bright);
  }

  .msg-player .speaker {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .msg-system {
    text-align: center;
    padding: 12px;
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
  }

  .msg-effect {
    text-align: center;
    padding: 8px 16px;
    font-size: 13px;
    background: rgba(201, 168, 76, 0.08);
    border-radius: 4px;
    max-width: 480px;
    margin: 8px auto;
  }

  /* Choices */
  #choices {
    padding: 16px 48px 24px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }

  #choices.hidden { display: none; }

  .choice-btn {
    display: block;
    width: 100%;
    max-width: 640px;
    margin: 0 auto 8px;
    padding: 12px 20px;
    background: rgba(201, 168, 76, 0.06);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .choice-btn:hover {
    background: rgba(201, 168, 76, 0.12);
    border-color: var(--accent-dim);
    color: var(--text-bright);
  }

  .choice-btn:active {
    background: rgba(201, 168, 76, 0.18);
  }

  .choice-btn.locked {
    opacity: 0.4;
    cursor: not-allowed;
    border-style: dashed;
  }

  .choice-btn .roll-tag {
    display: inline-block;
    font-size: 11px;
    font-family: 'Cinzel', serif;
    color: var(--accent-dim);
    margin-left: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .choice-btn .lock-tag {
    display: inline-block;
    font-size: 11px;
    font-family: 'Cinzel', serif;
    color: var(--red);
    margin-left: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Right sidebar - NPC list */
  #sidebar-right {
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
  }

  .npc-card {
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .npc-card:hover {
    border-color: var(--accent-dim);
    background: rgba(201, 168, 76, 0.05);
  }

  .npc-card.active {
    border-color: var(--accent);
    background: rgba(201, 168, 76, 0.1);
  }

  .npc-card.unavailable {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .npc-name {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
  }

  .npc-faction {
    font-size: 12px;
    color: var(--text-dim);
  }

  .npc-rank {
    font-size: 11px;
    color: var(--accent-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; height: 100%; }

  /* NPC selection screen */
  #npc-select-screen {
    padding: 48px;
    align-items: center;
    justify-content: center;
  }

  #npc-select-screen h2 {
    font-family: 'Cinzel', serif;
    font-size: 24px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  #npc-select-screen p {
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  #npc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    max-width: 720px;
    width: 100%;
  }

  /* Game over screen */
  #game-over-screen {
    padding: 48px;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  #game-over-screen h2 {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  /* Roll animation */
  .roll-result {
    text-align: center;
    padding: 12px;
    margin: 8px auto;
    max-width: 400px;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 1px;
    border-radius: 4px;
    animation: fadeIn 0.3s ease;
  }

  .roll-success { background: rgba(74, 122, 58, 0.2); color: var(--green); border: 1px solid var(--green); }
  .roll-partial { background: rgba(201, 168, 76, 0.15); color: var(--accent); border: 1px solid var(--accent-dim); }
  .roll-failure { background: rgba(168, 64, 50, 0.2); color: var(--red); border: 1px solid var(--red); }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1>Disco Romana</h1>
    <span id="phase-info"></span>
    <span id="turn-counter"></span>
  </div>

  <div id="sidebar-left">
    <div class="sidebar-section">
      <h3>Reputation</h3>
      <div id="reputation-display"></div>
    </div>
    <div class="sidebar-section">
      <h3>Factions</h3>
      <div id="faction-display"></div>
    </div>
    <div class="sidebar-section">
      <h3>Rank</h3>
      <div id="rank-display"></div>
    </div>
  </div>

  <div id="main">
    <div id="npc-select-screen" class="screen active">
      <h2>Choose Your Audience</h2>
      <p>Each outbound conversation costs one turn.</p>
      <div id="npc-grid"></div>
    </div>

    <div id="conversation-screen" class="screen">
      <div id="conversation-scroll"></div>
      <div id="choices" class="hidden"></div>
    </div>

    <div id="game-over-screen" class="screen">
      <h2 id="game-over-title"></h2>
      <p id="game-over-reason"></p>
    </div>
  </div>

  <div id="sidebar-right">
    <div class="sidebar-section">
      <h3>Characters</h3>
      <div id="npc-list"></div>
    </div>
  </div>
</div>

<script src="game.js?v=5"></script>
</body>
</html>
